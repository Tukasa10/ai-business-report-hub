<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI業務レポート自動生成ハブ</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">EC Sales & Ads Report</p>
        <h1>AI業務レポート自動生成ハブ</h1>
        <p class="lead">CSVから売上・広告指標・異常値・改善提案を自動生成するローカルデモ</p>
      </div>
      <div class="header-actions" aria-label="レポート操作">
        <button id="loadSampleButton" type="button">サンプル読込</button>
        <label class="file-button">
          CSV選択
          <input id="csvFileInput" type="file" accept=".csv,text/csv">
        </label>
        <button id="exportCsvButton" type="button">CSV出力</button>
        <button id="printButton" type="button">PDF印刷</button>
      </div>
    </header>

    <main class="report-shell">
      <section class="status-strip" aria-live="polite">
        <div>
          <span class="status-label">データ</span>
          <strong id="dataStatus">未読込</strong>
        </div>
        <div>
          <span class="status-label">期間</span>
          <strong id="periodStatus">-</strong>
        </div>
        <div>
          <span class="status-label">品質</span>
          <strong id="qualityStatus">-</strong>
        </div>
      </section>

      <section class="kpi-grid" id="kpiGrid" aria-label="主要KPI"></section>

      <section class="report-grid">
        <article class="panel wide">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Daily Trend</p>
              <h2>日別売上推移</h2>
            </div>
            <span id="trendBadge" class="badge">-</span>
          </div>
          <div class="chart-wrap">
            <canvas id="dailyTrendChart" width="960" height="360" aria-label="日別売上推移グラフ"></canvas>
          </div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Ranking</p>
              <h2>商品別売上</h2>
            </div>
          </div>
          <div class="chart-wrap compact">
            <canvas id="productRankingChart" width="640" height="360" aria-label="商品別売上ランキンググラフ"></canvas>
          </div>
          <div id="productTable" class="table-wrap"></div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Channel</p>
              <h2>チャネル別集計</h2>
            </div>
          </div>
          <div class="chart-wrap compact">
            <canvas id="channelChart" width="640" height="360" aria-label="チャネル別売上グラフ"></canvas>
          </div>
          <div id="channelTable" class="table-wrap"></div>
        </article>

        <article class="panel wide">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">AI Mock Analysis</p>
              <h2>AI風分析コメント</h2>
            </div>
          </div>
          <div id="insightSummary" class="insight-summary"></div>
          <div class="insight-columns">
            <div>
              <h3>検出ポイント</h3>
              <ul id="findingList" class="insight-list"></ul>
            </div>
            <div>
              <h3>次にやるべき施策</h3>
              <ol id="actionList" class="insight-list numbered"></ol>
            </div>
          </div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Anomaly</p>
              <h2>異常値・注意点</h2>
            </div>
          </div>
          <ul id="anomalyList" class="alert-list"></ul>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Export</p>
              <h2>出力対象</h2>
            </div>
          </div>
          <div id="exportPreview" class="export-preview"></div>
        </article>
      </section>
    </main>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <h2>CSVレポート待機中</h2>
        <p>サンプルCSVまたは手元のCSVを読み込むと、集計・可視化・改善提案を自動生成します。</p>
      </div>
    </template>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
